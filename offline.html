<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>LOMO — офлайн</title>
  <meta name="theme-color" content="#eef5f8"/>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f9fb;
      --surface: #ffffff;
      --text: #16202a;
      --muted: #6b7a8c;
      --line: #d9e7ee;
      --accent: #2a7a8a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(42, 122, 138, 0.08), transparent 40%),
        linear-gradient(180deg, var(--bg), #eef5f8);
      color: var(--text);
    }
    .card {
      width: min(100%, 440px);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
    }
    .title {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 800;
    }
    .text {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }
    .button {
      appearance: none;
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      color: white;
      background: var(--accent);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">Вы офлайн</h1>
    <p class="text">LOMO сохранил базовую оболочку приложения, но для ленты, профилей и документов снова понадобится подключение к интернету.</p>
    <button class="button" type="button" onclick="location.reload()">Попробовать снова</button>
  </div>
</body>
</html>
